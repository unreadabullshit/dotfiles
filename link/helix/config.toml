theme = "Galactic Flavored"

[editor]
scrolloff = 8
mouse = false
middle-click-paste = false
line-number = "relative"
cursorline = true
# rulers = [80]
bufferline = "always"
color-modes = true
end-of-line-diagnostics = "hint"


[editor.statusline]
left = ["mode", "spinner"]
center = ["diagnostics"]
right = ["version-control", "position", "file-encoding", "file-type"]
separator = "│"
mode.normal = "NORMAL"
mode.insert = "INSERT"
mode.select = "SELECT"

[editor.gutters.line-numbers]
min-width = 1

[editor.lsp]
snippets = false

[editor.cursor-shape]
insert = "bar"
select = "underline"

[editor.indent-guides]
render = true
character = "╎"
skip-levels = 1

[editor.inline-diagnostics]
cursor-line = "warning"

[keys.normal]
esc = ["collapse_selection", "keep_primary_selection"]
tab = ":buffer-next"
S-tab = ":buffer-previous"
C-x = ":buffer-close"
C-s = ":write"
